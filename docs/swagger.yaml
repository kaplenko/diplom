basePath: /api/v1
definitions:
  models.Course:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      description:
        type: string
      id:
        type: integer
      title:
        type: string
      updated_at:
        type: string
    type: object
  models.CourseProgress:
    properties:
      completed_count:
        type: integer
      course_id:
        type: integer
      course_title:
        type: string
      percentage:
        type: number
      total_lessons:
        type: integer
    type: object
  models.CreateCourseRequest:
    properties:
      description:
        maxLength: 5000
        minLength: 1
        type: string
      title:
        maxLength: 200
        minLength: 1
        type: string
    required:
    - description
    - title
    type: object
  models.CreateLessonRequest:
    properties:
      content:
        minLength: 1
        type: string
      order_index:
        minimum: 0
        type: integer
      title:
        maxLength: 200
        minLength: 1
        type: string
    required:
    - content
    - title
    type: object
  models.CreateSubmissionRequest:
    properties:
      code:
        minLength: 1
        type: string
    required:
    - code
    type: object
  models.CreateTaskRequest:
    properties:
      description:
        minLength: 1
        type: string
      difficulty:
        allOf:
        - $ref: '#/definitions/models.Difficulty'
        enum:
        - easy
        - medium
        - hard
      initial_code:
        type: string
      test_cases:
        items:
          $ref: '#/definitions/models.TestCase'
        minItems: 1
        type: array
      title:
        maxLength: 200
        minLength: 1
        type: string
    required:
    - description
    - difficulty
    - test_cases
    - title
    type: object
  models.Difficulty:
    enum:
    - easy
    - medium
    - hard
    type: string
    x-enum-varnames:
    - DifficultyEasy
    - DifficultyMedium
    - DifficultyHard
  models.ErrorBody:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  models.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/models.ErrorBody'
    type: object
  models.Lesson:
    properties:
      content:
        type: string
      course_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      order_index:
        type: integer
      title:
        type: string
      updated_at:
        type: string
    type: object
  models.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  models.PaginatedResponse:
    properties:
      data: {}
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  models.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  models.RegisterRequest:
    properties:
      email:
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
      password:
        maxLength: 128
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  models.Role:
    enum:
    - student
    - admin
    type: string
    x-enum-varnames:
    - RoleStudent
    - RoleAdmin
  models.Submission:
    properties:
      code:
        type: string
      id:
        type: integer
      result:
        type: string
      score:
        type: integer
      status:
        $ref: '#/definitions/models.SubmissionStatus'
      submitted_at:
        type: string
      task_id:
        type: integer
      user_id:
        type: integer
    type: object
  models.SubmissionStatus:
    enum:
    - pending
    - passed
    - failed
    type: string
    x-enum-varnames:
    - StatusPending
    - StatusPassed
    - StatusFailed
  models.Task:
    properties:
      created_at:
        type: string
      description:
        type: string
      difficulty:
        $ref: '#/definitions/models.Difficulty'
      id:
        type: integer
      initial_code:
        type: string
      lesson_id:
        type: integer
      test_cases:
        items:
          type: object
        type: array
      title:
        type: string
      updated_at:
        type: string
    type: object
  models.TestCase:
    properties:
      expected:
        type: string
      input:
        type: string
    type: object
  models.TokenResponse:
    properties:
      access_token:
        type: string
      expires_at:
        type: string
      refresh_token:
        type: string
    type: object
  models.UpdateCourseRequest:
    properties:
      description:
        maxLength: 5000
        minLength: 1
        type: string
      title:
        maxLength: 200
        minLength: 1
        type: string
    type: object
  models.UpdateLessonRequest:
    properties:
      content:
        minLength: 1
        type: string
      order_index:
        minimum: 0
        type: integer
      title:
        maxLength: 200
        minLength: 1
        type: string
    type: object
  models.UpdateTaskRequest:
    properties:
      description:
        minLength: 1
        type: string
      difficulty:
        allOf:
        - $ref: '#/definitions/models.Difficulty'
        enum:
        - easy
        - medium
        - hard
      initial_code:
        type: string
      test_cases:
        items:
          $ref: '#/definitions/models.TestCase'
        minItems: 1
        type: array
      title:
        maxLength: 200
        minLength: 1
        type: string
    type: object
  models.UpdateUserRequest:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
    type: object
  models.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      role:
        $ref: '#/definitions/models.Role'
    type: object
host: localhost:8080
info:
  contact: {}
  description: Online programming learning platform API
  title: Diplom API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT tokens
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Login
      tags:
      - Auth
  /auth/refresh:
    post:
