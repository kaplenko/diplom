version: "2"

linters:
  default: standard
  enable:
    - gosec
    - errcheck
    - bodyclose
    - misspell
    - unconvert
    - unparam
    - prealloc
    - errname

  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*github.com/gorilla/websocket.Conn).Close

    gosec:
      excludes:
        - G115
        - G204
        - G301
        - G303
        - G306
