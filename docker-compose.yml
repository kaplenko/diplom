services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-diplom}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-diplom}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "host=db port=5432 user=${DB_USER:-postgres} password=${DB_PASSWORD:-postgres} dbname=${DB_NAME:-diplom} sslmode=disable",
        "up"
      ]

  runner-image:
    build:
      context: .
      dockerfile: runner.Dockerfile
    image: runner-image:latest
    entrypoint: ["echo", "runner image built"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-diplom}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY_HOURS: ${JWT_ACCESS_EXPIRY_HOURS:-1}
      JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS:-7}
      RUNNER_IMAGE: ${RUNNER_IMAGE:-runner-image:latest}
      RUNNER_TIMEOUT: ${RUNNER_TIMEOUT:-30}
      RUNNER_MEMORY: ${RUNNER_MEMORY:-256m}
      RUNNER_CPU: ${RUNNER_CPU:-0.5}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      runner-image:
        condition: service_completed_successfully

volumes:
  pgdata:
